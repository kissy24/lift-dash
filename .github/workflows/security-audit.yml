name: Security Audit

on:
  schedule:
    - cron: '0 9 * * 1'
  push:
    paths:
      - .github/workflows/security-audit.yml
      - bun.lock
      - bun.lockb
      - package.json

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  audit:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --lockfile=bun.lock
