name: Security Audit

on:
  schedule:
    - cron: '0 9 * * 1'
  push:
    paths:
      - .github/workflows/security-audit.yml
      - bun.lock
      - bun.lockb
      - package.json

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OSV Scanner
        uses: google/osv-scanner-action@v1.9.2
        with:
          scan-args: |-
            --lockfile=bun.lock
