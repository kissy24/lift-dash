name: Dependabot Bun Lockfile

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  actions: write
  contents: write
  pull-requests: read

concurrency:
  group: dependabot-bun-lockfile-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update-lockfile:
    if: >-
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out Dependabot branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0
      - name: Update bun.lock only
        run: bun install --lockfile-only --ignore-scripts
      - name: Commit lockfile changes
        run: |
          if git diff --quiet -- bun.lock; then
            echo "bun.lock is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore(deps): update bun lockfile"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Run Quality workflow for updated branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: gh workflow run quality.yml --ref "$HEAD_REF"
